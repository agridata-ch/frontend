<div
  class="flex flex-col bg-gray-100 py-6 px-4 rounded-lg gap-6"
  *i18n="let t; prefix: 'data-request.form'"
>
  <div class="flex flex-col gap-2">
    <h4>{{ t('request.provider.heading') }}</h4>
    <span class="text-sm text-agridata-tertiary-text">{{ t('request.provider.sublabel') }}</span>
    <a
      [href]="productDataLink"
      target="_blank"
      class="text-agridata-primary-600 hover:underline cursor-pointer w-fit"
    >
      {{ t('request.products.moreInfos') }}
    </a>
  </div>
  <div class="flex flex-col gap-2">
    <div class="flex flex-col">
      <label
        class="mb-2 font-medium leading-[130%]"
        for="requestProvider"
        [class.text-red-500]="hasProviderError()"
      >
        {{ t('request.provider.label') }}
      </label>
      <div class="flex gap-2 items-center">
        <app-agridata-select
          [disabled]="formDisabled()"
          [hasError]="hasProviderError()"
          [options]="providersOptions()"
          [selectedOption]="selectedProviderId()"
          (selectedOptionChange)="onProviderChange($event)"
          id="requestProvider"
          [placeholder]="t('request.provider.placeholder')"
          class="w-1/2"
        />
        @if (productsLoading()) {
          <fa-icon animation="spin" [icon]="faSpinnerThird"></fa-icon>
        }
      </div>
    </div>
    @if (showProducts() && !productsLoading()) {
      <div class="flex flex-col w-full">
        <div class="flex flex-col gap-1 mb-2">
          <label
            class="font-medium leading-[130%] min-w-40"
            for="requestCategory"
            [class.text-red-500]="hasProductsError()"
          >
            {{ t('request.products.label') }}
          </label>
          <span class="text-sm text-agridata-tertiary-text font-medium">
            {{ t('request.products.sublabel') }}
          </span>
        </div>
        <div class="flex w-full">
          <app-agridata-select
            [customClass]="'rounded-none rounded-l-md border-r-0 min-w-56'"
            [disabled]="formDisabled()"
            [hasError]="hasProductsError()"
            [options]="dataProductsCategories()"
            [selectedOption]="selectedCategory()"
            (selectedOptionChange)="onCategoryChange($event)"
          />
          <app-agridata-multi-select
            class="flex-1"
            [categories]="productsGrouped()"
            [control]="getFormControl(this.form()!, 'request.products')"
            [customClass]="'rounded-none rounded-r-md'"
            [disabled]="formDisabled()"
            [hasError]="hasProductsError()"
            id="requestProducts"
            [placeholder]="t('request.products.placeholder')"
            [singleCategorySelection]="true"
          />
        </div>
      </div>
    }
    <span class="min-h-[1.5em] block text-gray-700" [class.text-red-500]="hasProductsError()">
      @if (hasProductsError()) {
        <span class="text-sm">{{ getProductsErrorMessage() }}</span>
      }
    </span>
  </div>
</div>
