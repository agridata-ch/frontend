<ng-container *i18n="let t; prefix: 'admin'">
  <app-data-request-details
    [dataRequestId]="dataRequestId()"
    [isRedirectUriRegexEditable]="true"
    (closeSidepanel)="handleClose()"
    #details
  >
    <div footer class="flex gap-2 justify-between">
      <div class="flex gap-2">
        <app-agridata-button
          class="flex-1"
          [variant]="ButtonVariants.PrimaryAccept"
          [loading]="isAccepting()"
          [disabled]="isActionPending() || details.dataRequest()?.stateCode !== DataRequestStateEnum.InReview"
          (handleClick)="acceptRequest()"
        >
          {{ t('actions.accept') }}
        </app-agridata-button>
        <app-agridata-button
          class="flex-1"
          [variant]="ButtonVariants.SecondaryReject"
          [loading]="isRejecting()"
          [disabled]="isActionPending() || details.dataRequest()?.stateCode !== DataRequestStateEnum.InReview"
          (handleClick)="rejectRequest()"
        >
          {{ t('actions.reject') }}
        </app-agridata-button>
      </div>
      @if (details.dataRequest()?.stateCode === DataRequestStateEnum.ToBeActivated) {
      <app-agridata-button
        class="flex-1"
        [variant]="ButtonVariants.PrimaryAccept"
        [loading]="isActivating()"
        (handleClick)="activateRequest()"
      >
        {{ t('actions.activate') }}
      </app-agridata-button>
      }
    </div>
  </app-data-request-details>
</ng-container>
