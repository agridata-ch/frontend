<div class="flex flex-col gap-6" *i18n="let t; prefix: 'data-request.contractSignaturePolicy'">
  <div class="flex flex-col gap-2">
    <h4>{{ t('title') }}</h4>
    <span class="text-sm">{{ t('subtitle', { company: companyName() }) }}</span>
  </div>
  <app-agridata-radio-group
    [options]="policyOptions()"
    [value]="selectedPolicy()"
    (valueChange)="handlePolicyChange($event)"
    [disabled]="disabled()"
  />
</div>
