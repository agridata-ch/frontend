<ng-container *i18n="let t; prefix: 'data-request.contractPdf'">
  <h4 class="mb-4">{{ t('title') }}</h4>
  <div class="py-3 px-4 border border-agridata-stroke rounded-lg">
    <app-agridata-file-download
      [fileName]="fileName()"
      [downloadable]="true"
      [isOpening]="isLoadingOpen()"
      [isDownloading]="isLoadingDownload()"
      [downloadLabel]="t('download')"
      (handleOpen)="handleOpenPdf()"
      (handleDownload)="handleDownloadPdf()"
    />
  </div>
</ng-container>
