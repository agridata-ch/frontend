<div class="overflow-hidden rounded-lg border border-agridata-stroke">
  @for (option of options(); track option.value) {
    <label
      class="group flex items-center gap-4 px-6 py-7 disabled:hover:bg-white"
      [class.border-t]="$index > 0"
      [class.border-gray-300]="$index > 0"
      [class.cursor-pointer]="!disabled()"
      [class.cursor-not-allowed]="disabled()"
      [class.hover:bg-gray-100]="!disabled()"
      [class.hover:bg-white]="disabled()"
    >
      <span class="relative mt-1 h-6 w-6 shrink-0">
        <input
          type="radio"
          class="peer sr-only"
          [name]="name()"
          [disabled]="disabled()"
          [attr.aria-label]="ariaLabel() || option.title"
          [checked]="value() === option.value"
          (change)="selectOption(option.value)"
          tabindex="0"
        />

        <span
          aria-hidden="true"
          class="absolute inset-0 rounded-full border-2 border-agridata-primary-600 bg-white transition-colors duration-150 peer-focus-visible:outline-2 peer-focus-visible:outline-agridata-primary-700 peer-focus-visible:outline-offset-2 peer-disabled:border-gray-500 peer-disabled:bg-gray-200 group-hover:bg-agridata-primary-100 peer-checked:bg-agridata-primary-700 peer-checked:border-agridata-primary-700"
        ></span>

        <span
          aria-hidden="true"
          class="absolute top-1/2 left-1/2 h-2 w-2 -translate-x-1/2 -translate-y-1/2 rounded-full opacity-0 scale-0 transition-all duration-150 peer-checked:opacity-100 peer-checked:scale-100"
          [class.bg-white]="!disabled()"
          [class.bg-gray-600]="disabled()"
        ></span>
      </span>

      <div class="flex flex-col gap-1">
        <p class="text-agridata-primary-text" [class.text-gray-600]="disabled()">
          {{ option.title }}
        </p>
        @if (option.subtitle) {
          <p class="text-sm text-agridata-tertiary-text">
            {{ option.subtitle }}
          </p>
        }
      </div>
    </label>
  }
</div>
