<div class="flex gap-3 justify-center">
  @for (i of digitIndices; track i) {
    <input
      #digitBox
      type="text"
      inputmode="numeric"
      maxlength="1"
      class="w-10 h-12 text-center text-xl font-semibold border-2 rounded-lg border-agridata-stroke bg-transparent outline-none focus:border-agridata-primary-600 placeholder:text-agridata-secondary-text caret-transparent"
      placeholder="_"
      [class.border-red-500]="hasError()"
      (input)="onDigitInput(i, $event)"
      (keydown)="onDigitKeydown(i, $event)"
      (paste)="onDigitPaste($event)"
    />
  }
</div>
