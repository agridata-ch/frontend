<ng-template #content>
  <ng-content></ng-content>
</ng-template>

@if (!href()) {
  <div class="contents" [title]="disabled() ? disabledInfo() : ''">
    <button
      [type]="type()"
      [disabled]="disabled()"
      [tabindex]="tabindex()"
      [attr.aria-label]="ariaLabel()"
      [attr.data-testid]="dataTestId()"
      (click)="handleClick($event)"
      (keydown.enter)="handleClick($event)"
      [class]="`relative agridata-button agridata-button-${variant()} ${selected() ? 'selected' : ''} ${additionalClass()}`"
    >
      @if (loading()) {
        <fa-icon
          animation="spin"
          [icon]="faSpinnerThird"
          class="absolute flex items-center justify-center inset-0"
        ></fa-icon>
      }
      <span [class.invisible]="loading()">
        <ng-container [ngTemplateOutlet]="content"></ng-container>
      </span>
    </button>
  </div>
} @else {
  <a
    [href]="href()"
    [target]="target()"
    [tabindex]="tabindex()"
    [attr.data-testid]="dataTestId()"
    [rel]="'noopener noreferrer'"
    [class]="`agridata-button agridata-button-${variant()} ${selected() ? 'selected' : ''} ${additionalClass()}`"
  >
    <ng-container [ngTemplateOutlet]="content"></ng-container>
  </a>
}
