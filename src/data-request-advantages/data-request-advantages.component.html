<div class="flex flex-col gap-2" *i18n="let t; prefix: 'data-request.contact'; lang: lang()">
  <h4>{{ t('advantages') }}</h4>
  <ol class="list-inside list-disc px-4 flex flex-col gap-2 justify-center">
    @for (advantage of advantages(); track advantage) {
      <li
        class="flex items-center gap-3 before:content-['•'] before:text-[1.5em] before:leading-none"
      >
        {{ getAdvantageText(advantage, lang()) }}
      </li>
    }
  </ol>
</div>
