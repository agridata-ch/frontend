            dataSourceSystemId:
              $ref: "#/components/schemas/UUID"
            dataSourceSystem:
              $ref: "#/components/schemas/DataSourceSystemReferenceDto"
            humanFriendlyId:
              type: string
              examples:
              - GL56
              description: Human friendly id of the data request
            submissionDate:
