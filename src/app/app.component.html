<app-error-outlet></app-error-outlet>
<app-debug></app-debug>
<router-outlet />

@if (isNavigating()) {
  <!-- Keep this overlay above routed content and other global UI while navigation is in progress. -->
  <output
    class="fixed inset-0 z-9999 flex items-center justify-center bg-agridata-primary-text"
    aria-label="loading"
  >
    <div class="relative flex items-center justify-center">
      <div
        class="absolute h-40 w-40 animate-spin rounded-full border-4 border-white/10 border-t-white/80"
      ></div>
      <img src="assets/favicon/favicon.svg" alt="" class="h-30 w-auto" />
    </div>
  </output>
}
