description:
  en:
    localisedName: agridata.ch Frontend
    shortDescription: Data transfer service for the secure and trustworthy sharing
      of data within the Swiss agriculture and food sector
    longDescription: agridata.ch is the foundation for the Swiss agricultural and
      food sector’s data space. It provides a secure, efficient, and trustworthy
      data transfer service that enables interoperability and supports the
      once-only principle (data is collected once at the source and reused
      across participants).
    documentation: https://agridata.ch/
    apiDocumentation: https://github.com/agridata-ch/.github/wiki
    features:
      - Data Space
      - Data Transfer
      - Data Products
      - Consent Management
      - Data Request Management
